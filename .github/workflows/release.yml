name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: ''
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install ARM64 cross-compiler
        if: matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone CLIProxyAPI SDK (latest release)
        run: |
          CPA_TAG=$(curl -s https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | python3 -c "import sys,json;print(json.load(sys.stdin)['tag_name'])")
          echo "Cloning CPA $CPA_TAG"
          git clone --depth 1 --branch "$CPA_TAG" https://github.com/router-for-me/CLIProxyAPI.git /tmp/CLIProxyAPI

      - name: Replace SDK path
        run: sed -i "s|../CLIProxyAPI|/tmp/CLIProxyAPI|g" go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go mod tidy
          go build -trimpath -ldflags="-s -w -X main.pluginVersion=${VERSION}" -buildmode=c-shared -o codexcomp.so

      - name: Test (native only)
        if: matrix.goarch == 'amd64'
        run: go test ./...

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip "codexcomp_${VERSION}_linux_${{ matrix.goarch }}.zip" codexcomp.so

      - uses: actions/upload-artifact@v4
        with:
          name: codexcomp-linux-${{ matrix.goarch }}
          path: codexcomp_*.zip

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum codexcomp_*.zip > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/codexcomp_*.zip
            artifacts/checksums.txt
